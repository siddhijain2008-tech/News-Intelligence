<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}NewsIQ{% endblock %}</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --card:#21253a; --border:#2d3148;
  --accent:#6c63ff; --accent2:#ff6584; --green:#43e97b; --yellow:#fdcb6e;
  --text:#e8eaf0; --muted:#8892a4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:6px;height:56px;position:sticky;top:0;z-index:100}
.logo{font-weight:800;font-size:1.1rem;color:var(--accent);text-decoration:none;margin-right:12px}
.logo span{color:var(--accent2)}
.nav-link{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:20px;font-size:.85rem;font-weight:500;transition:all .15s;white-space:nowrap}
.nav-link:hover,.nav-link.active{background:var(--accent);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.75rem;color:var(--muted)}
.stat-pill strong{color:var(--text)}
.btn-refresh{background:var(--accent);border:none;border-radius:8px;padding:7px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:.82rem}
.btn-refresh:hover{opacity:.85}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;text-decoration:none;flex-shrink:0}

/* MAIN */
main{max-width:1140px;margin:0 auto;padding:24px 16px}

/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-header h1{font-size:1.5rem;font-weight:800}
.page-header p{color:var(--muted);margin-top:4px;font-size:.88rem}

/* CHIPS */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:5px 14px;border-radius:20px;font-size:.78rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:all .15s}
.chip:hover,.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 56px 13px 18px;color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:8px;padding:7px 14px;color:#fff;cursor:pointer;font-weight:600;font-size:.82rem}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:transform .2s,box-shadow .2s;position:relative;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,99,255,.12)}
.card-cat{display:inline-block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:2px 8px;border-radius:8px;margin-bottom:8px}
.cat-AI{background:rgba(0,206,201,.15);color:#00cec9}
.cat-Technology{background:rgba(108,99,255,.2);color:#a29bfe}
.cat-Business{background:rgba(67,233,123,.15);color:#43e97b}
.cat-World{background:rgba(255,101,132,.15);color:#ff6584}
.cat-Science{background:rgba(253,203,110,.15);color:#fdcb6e}
.cat-India{background:rgba(253,121,30,.15);color:#fd791e}
.cat-Sports{background:rgba(116,185,255,.15);color:#74b9ff}
.cat-Health{background:rgba(85,239,196,.15);color:#55efc4}
.cat-Politics{background:rgba(162,155,254,.15);color:#a29bfe}
.cat-Environment{background:rgba(0,184,148,.15);color:#00b894}
.card-title{font-size:.95rem;font-weight:700;line-height:1.4;margin-bottom:8px;flex-grow:1}
.card-title a{color:var(--text);text-decoration:none}
.card-title a:hover{color:var(--accent)}
.card-summary{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{font-size:.72rem;color:var(--muted);margin-bottom:12px}
.card-actions{display:flex;gap:6px;margin-top:auto}
.action-btn{flex:1;border:1px solid var(--border);background:transparent;border-radius:8px;padding:6px;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.action-btn:hover{background:var(--surface);color:var(--text)}
.action-btn.like:hover{border-color:var(--green);color:var(--green)}
.action-btn.dislike:hover{border-color:var(--accent2);color:var(--accent2)}
.action-btn.save:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.active-like{background:rgba(67,233,123,.15);border-color:var(--green);color:var(--green)}
.action-btn.active-dislike{background:rgba(255,101,132,.15);border-color:var(--accent2);color:var(--accent2)}
.action-btn.active-save{background:rgba(108,99,255,.15);border-color:var(--accent);color:var(--accent)}
.score-badge{position:absolute;top:12px;right:12px;background:rgba(108,99,255,.2);color:#a29bfe;border-radius:6px;font-size:.67rem;font-weight:700;padding:2px 6px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:3rem;margin-bottom:12px}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;border-radius:10px;padding:10px 18px;font-weight:600;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/">News<span>IQ</span></a>
  <a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/">Feed</a>
  <a class="nav-link {% if request.path=='/search' %}active{% endif %}" href="/search">Search</a>
  <a class="nav-link {% if request.path=='/trends' %}active{% endif %}" href="/trends">Trends</a>
  <a class="nav-link {% if request.path=='/summary' %}active{% endif %}" href="/summary">Digest</a>
  <a class="nav-link {% if request.path=='/saved' %}active{% endif %}" href="/saved">Saved</a>
  <div class="nav-right">
    {% if stats %}
    <span class="stat-pill"><strong>{{ stats.articles }}</strong> articles</span>
    {% endif %}
    <button class="btn-refresh" onclick="triggerIngest()">↻ Refresh</button>
    {% if profile %}
    <a class="avatar" href="/profile" title="Profile">{{ profile.name[0]|upper }}</a>
    {% endif %}
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<div id="toast"></div>
<script>
function toast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}
async function interact(aid,action,btn){
  const r=await fetch('/api/interact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:aid,action})});
  if(r.ok){
    const icons={like:'👍',dislike:'👎',save:'🔖'};
    toast(icons[action]+' '+action.charAt(0).toUpperCase()+action.slice(1)+'d!');
    btn.closest('.card-actions').querySelectorAll('.action-btn').forEach(b=>b.classList.remove('active-like','active-dislike','active-save'));
    btn.classList.add('active-'+action);
  }
}
async function triggerIngest(){
  toast('Fetching latest news…',5000);
  await fetch('/api/ingest',{method:'POST'});
  setTimeout(()=>toast('Done! Reload to see new articles.',3000),3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
